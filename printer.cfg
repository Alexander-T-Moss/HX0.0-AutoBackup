[include fluidd.cfg]
[include Hardware/hardware.cfg]
[include Macros/macros.cfg]

[force_move]
enable_force_move: true


[virtual_sdcard]
path: /home/hex-zero/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 20000
max_z_velocity: 30
max_z_accel: 2000

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[z_tilt]
z_positions:
    4, 9
    63, 117
    114, 9

points:
    39.7, 13
    90.7, 103
    129.7, 13

horizontal_move_z: 20
retries: 5
retry_tolerance: 0.05
speed: 100

[bed_mesh]
speed: 200
horizontal_move_z: 15
mesh_min: 13.3, 10
mesh_max: 103.8, 101
probe_count: 5, 5

