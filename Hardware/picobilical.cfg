[mcu]
serial: /dev/serial/by-id/usb-Klipper_rp2040_3252343737074F9C-if00

[extruder]                                     
rotation_distance: 22.23                                         
gear_ratio: 50:10                                               
microsteps: 32
nozzle_diameter: 0.400
filament_diameter: 1.750

control: pid                                                       
pid_Kp: 35.712
pid_Ki: 4.578
pid_Kd: 69.638

min_temp: 0
max_temp: 300
min_extrude_temp: 170
max_extrude_only_distance: 150
max_extrude_cross_section: 1
pressure_advance: 0.03                                             
pressure_advance_smooth_time: 0.040

heater_pin: mcu:gpio4
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: mcu:gpio29
pullup_resistor: 2200

[probe]
pin: mcu:gpio0
x_offset: -27.7
z_offset: 8
samples:3
sample_retract_dist: 1
speed: 10
lift_speed: 30
samples_result:median
samples_tolerance: 0.1
samples_tolerance_retries: 3

[fan]
pin: mcu:gpio2
max_power: 1.0
kick_start_time: 0.5
cycle_time: 0.010

[heater_fan hotend_fan]
pin: mcu:gpio3
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 60.0

[neopixel Rainbow_Matchstick_Right]
pin: mcu:gpio1
chain_count: 10
color_order: GRB
initial_RED: 0.3
initial_GREEN: 0.3
initial_BLUE: 0.3

[neopixel Rainbow_Matchstick_Left]
pin: mcu:gpio7
chain_count: 10
color_order: GRB
initial_RED: 0.3
initial_GREEN: 0.3
initial_BLUE: 0.3

[thermistor CMFB103F3950FANT]
temperature1: 0.0
resistance1: 32116.0
temperature2: 40.0
resistance2: 5309.0
temperature3: 80.0
resistance3: 1228.0

[temperature_sensor chamber_temp]
sensor_type: CMFB103F3950FANT
sensor_pin: mcu:gpio28
pullup_resistor: 2200
min_temp: 0
max_temp: 100
gcode_id: chamber_th