[mcu pico_xy]
serial: /dev/serial/by-id/usb-Klipper_rp2040_4550357128961E58-if00

[stepper_x]
enable_pin: !pico_xy:gpio7
step_pin: pico_xy:gpio6
dir_pin: pico_xy:gpio5                                                     

rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200                                        

[tmc2209 stepper_x]
uart_pin: pico_xy:gpio9
tx_pin: pico_xy:gpio8
uart_address: 2
interpolate: False
run_current: 0.85
sense_resistor: 0.110                                           
diag_pin: ^pico_xy:gpio3
stealthchop_threshold: 999999

driver_TBL: 2
driver_TOFF: 2
driver_HEND: 1
driver_HSTRT: 4
driver_PWM_LIM: 8 
driver_PWM_GRAD: 8
driver_PWM_FREQ: 1
driver_PWM_REG: 4

[stepper_y]
enable_pin: !pico_xy:gpio2
step_pin: pico_xy:gpio19
dir_pin: pico_xy:gpio28

rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200                                        

[tmc2209 stepper_y]
uart_pin: pico_xy:gpio9
tx_pin: pico_xy:gpio8
uart_address: 1
interpolate: False
run_current: 0.85
sense_resistor: 0.110
diag_pin: ^pico_xy:gpio25 
stealthchop_threshold: 999999

driver_TBL: 2
driver_TOFF: 2
driver_HEND: 1
driver_HSTRT: 4
driver_PWM_LIM: 8 
driver_PWM_GRAD: 8
driver_PWM_FREQ: 1
driver_PWM_REG: 4

[extruder]
enable_pin: !pico_xy:gpio12
step_pin: pico_xy:gpio11
dir_pin: !pico_xy:gpio10   

[tmc2209 extruder]
uart_pin: pico_xy:gpio9
tx_pin: pico_xy:gpio8
uart_address: 0
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

[controller_fan Electronics_Intake_A]
pin: pico_xy:gpio20
idle_speed: 0.3
heater: extruder